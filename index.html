<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>泰・打卡護照｜追星美食地圖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="data.js"></script>
<style>
  :root{
    --teal-deep:#0d4f45;
    --teal-mid:#123f38;
    --teal-line: rgba(245,239,227,0.14);
    --gold:#e8a33d;
    --gold-soft:#f3c98a;
    --stamp-red:#c1440e;
    --cream:#fff7ea;
    --card:#ffffff;
    --ink:#26211c;
    --ink-soft:#6b6055;
    --paper-line:#e7dcc8;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Noto Sans TC', sans-serif;
    color:var(--ink);
    background:var(--cream);
    overflow:hidden;
  }
  .app{
    display:flex;
    height:100vh;
    width:100vw;
    position:relative;
  }

  /* ---------- Sidebar ---------- */
  .sidebar{
    width:300px;
    min-width:300px;
    background:linear-gradient(180deg,var(--teal-deep), var(--teal-mid) 70%);
    color:#f5efe3;
    display:flex;
    flex-direction:column;
    padding:26px 20px 20px;
    position:relative;
    z-index:5;
    box-shadow: 4px 0 18px rgba(0,0,0,0.18);
    transition: width .28s cubic-bezier(.4,0,.2,1), min-width .28s cubic-bezier(.4,0,.2,1), padding .28s ease;
    overflow:hidden;
  }
  .sidebar.collapsed{
    width:0;
    min-width:0;
    padding-left:0;
    padding-right:0;
    box-shadow:none;
  }
  .sidebar-inner{
    width:260px; /* 固定內容寬度，收合時外層變窄但內容不擠壓變形 */
    display:flex;
    flex-direction:column;
    flex:1;
    min-height:0;
  }
  .sidebar-toggle{
    position:fixed;
    top:22px;
    left:300px;
    width:28px;
    height:48px;
    background:var(--teal-deep);
    color:var(--gold-soft);
    border:none;
    border-radius:0 10px 10px 0;
    cursor:pointer;
    z-index:5000;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:2px 2px 10px rgba(0,0,0,0.25);
    font-size:13px;
    transition:left .28s cubic-bezier(.4,0,.2,1);
  }
  .sidebar-toggle:hover{ background:var(--teal-mid); }
  #sidebar.collapsed + .sidebar-toggle{ left:0; }
  .sidebar-toggle svg{ transition:transform .28s ease; }
  #sidebar.collapsed + .sidebar-toggle svg{ transform:rotate(180deg); }
  .brand{
    display:flex;
    align-items:baseline;
    gap:8px;
    margin-bottom:4px;
  }
  .brand-mark{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:26px;
    letter-spacing:1px;
  }
  .brand-sub{
    font-size:11px;
    color:var(--gold-soft);
    letter-spacing:3px;
    text-transform:uppercase;
  }
  .brand-tag{
    font-size:12.5px;
    color:rgba(245,239,227,0.65);
    margin-top:6px;
    line-height:1.6;
    margin-bottom:22px;
  }

  .section-label{
    font-size:11px;
    letter-spacing:2.5px;
    color:var(--gold-soft);
    text-transform:uppercase;
    margin:4px 0 10px 2px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--teal-line);
  }

  .idol-list{
    display:flex;
    flex-direction:column;
    gap:8px;
    overflow-y:auto;
    padding-right:4px;
    margin-bottom:18px;
  }
  .idol-list::-webkit-scrollbar{width:5px;}
  .idol-list::-webkit-scrollbar-thumb{background:var(--teal-line); border-radius:4px;}

  .idol-chip{
    display:flex;
    align-items:center;
    gap:12px;
    padding:9px 12px;
    border-radius:12px;
    border:1px solid transparent;
    background:rgba(245,239,227,0.04);
    cursor:pointer;
    transition:all .15s ease;
    user-select:none;
  }
  .idol-chip:hover{ background:rgba(245,239,227,0.09); }
  .idol-chip.active{
    background:rgba(232,163,61,0.14);
    border-color:rgba(232,163,61,0.55);
  }
  .idol-avatar{
    width:34px;height:34px;
    min-width:34px;
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Noto Serif TC',serif;
    font-weight:700;
    font-size:14px;
    color:#1c1a17;
  }
  .idol-name{
    font-size:13.5px;
    font-weight:500;
    flex:1;
  }
  .idol-count{
    font-size:11px;
    color:rgba(245,239,227,0.5);
    font-variant-numeric: tabular-nums;
  }
  .idol-chip.active .idol-name{ color:#fff; font-weight:700;}
  .check-dot{
    width:15px;height:15px;
    border-radius:50%;
    border:1.5px solid rgba(245,239,227,0.35);
    flex-shrink:0;
    transition:all .15s ease;
  }
  .idol-chip.active .check-dot{
    background:var(--gold);
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(232,163,61,0.2);
  }

  .city-filter{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:20px;
  }
  .city-pill{
    font-size:11.5px;
    padding:5px 11px;
    border-radius:999px;
    border:1px solid var(--teal-line);
    color:rgba(245,239,227,0.75);
    cursor:pointer;
    transition:all .15s ease;
  }
  .city-pill:hover{border-color:var(--gold-soft); color:#fff;}
  .city-pill.active{
    background:var(--gold);
    border-color:var(--gold);
    color:#1c1a17;
    font-weight:700;
  }

  .stamp-count{
    margin-top:auto;
    padding-top:16px;
    border-top:1px dashed var(--teal-line);
    font-size:12px;
    color:rgba(245,239,227,0.55);
    line-height:1.7;
  }
  .stamp-count b{ color:var(--gold-soft); font-size:20px; font-family:'Noto Serif TC',serif;}

  /* ---------- Map area ---------- */
  .map-wrap{
    flex:1;
    position:relative;
  }
  #map{
    width:100%;
    height:100%;
    background:#e9e0cc;
  }
  .leaflet-tile-pane{ filter: saturate(0.85) sepia(0.08); }

  .map-topbar{
    position:absolute;
    top:18px; left:18px; right:18px;
    z-index:1000;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:14px;
    pointer-events:none;
  }
  .search-box{
    pointer-events:auto;
    background:var(--card);
    padding:9px 14px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(38,33,28,0.14);
    font-size:13px;
    color:var(--ink-soft);
    display:flex;
    align-items:center;
    gap:8px;
    max-width:280px;
  }
  .legend{
    pointer-events:auto;
    background:var(--card);
    padding:10px 14px;
    border-radius:12px;
    box-shadow:0 6px 18px rgba(38,33,28,0.14);
    font-size:12px;
    color:var(--ink-soft);
  }

  /* Leaflet pin (custom divIcon) */
  .stamp-pin{
    width:38px; height:38px;
    border-radius:50% 50% 50% 4px;
    transform:rotate(-45deg);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 10px rgba(38,33,28,0.35);
    border:2px solid var(--cream);
    cursor:pointer;
    transition:transform .15s ease;
  }
  .stamp-pin span{
    transform:rotate(45deg);
    font-size:16px;
  }
  .stamp-pin:hover{ transform:rotate(-45deg) scale(1.12); }

  /* Info card */
  .info-card{
    position:absolute;
    top:0; right:0;
    height:100%;
    width:360px;
    max-width:88vw;
    background:var(--card);
    box-shadow:-8px 0 24px rgba(38,33,28,0.18);
    z-index:1200;
    transform:translateX(100%);
    transition:transform .28s cubic-bezier(.4,0,.2,1);
    display:flex;
    flex-direction:column;
    overflow-y:auto;
  }
  .info-card.open{ transform:translateX(0); }

  .card-photo{
    height:160px;
    background:linear-gradient(135deg,var(--gold-soft),var(--stamp-red));
    background-size:cover;
    background-position:center;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
  }
  .card-photo-emoji{ font-size:52px; filter:drop-shadow(0 4px 6px rgba(0,0,0,0.15)); }
  .card-photo-img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .card-close{
    position:absolute; top:12px; right:12px;
    width:30px;height:30px;
    border-radius:50%;
    background:rgba(38,33,28,0.35);
    color:#fff;
    border:none;
    font-size:16px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .card-body{ padding:20px 22px 26px; }
  .card-city{
    font-size:11px;
    letter-spacing:2px;
    color:var(--stamp-red);
    text-transform:uppercase;
    font-weight:700;
    margin-bottom:6px;
  }
  .card-title{
    font-family:'Noto Serif TC',serif;
    font-weight:900;
    font-size:22px;
    line-height:1.3;
    margin:0 0 10px;
  }
  .card-visitors{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:14px;
  }
  .visitor-tag{
    font-size:11.5px;
    padding:4px 10px;
    border-radius:999px;
    background:rgba(13,79,69,0.08);
    color:var(--teal-deep);
    font-weight:700;
  }
  .card-desc{
    font-size:13.5px;
    line-height:1.85;
    color:var(--ink-soft);
    margin-bottom:16px;
  }
  .card-meta{
    display:flex;
    flex-direction:column;
    gap:9px;
    font-size:12.5px;
    color:var(--ink-soft);
    border-top:1px dashed var(--paper-line);
    padding-top:14px;
    margin-bottom:18px;
  }
  .card-meta div{ display:flex; gap:8px; }
  .card-meta b{ color:var(--ink); font-weight:700; min-width:56px;}
  .card-actions{ display:flex; gap:10px; }
  .btn{
    flex:1;
    text-align:center;
    padding:12px 14px;
    border-radius:10px;
    font-size:13px;
    font-weight:700;
    text-decoration:none;
    cursor:pointer;
    border:none;
    transition:filter .15s ease;
  }
  .btn:hover{ filter:brightness(1.06); }
  .btn-primary{ background:var(--teal-deep); color:#fff; }
  .btn-ghost{ background:transparent; color:var(--teal-deep); border:1.5px solid var(--teal-deep); }

  .empty-hint{
    position:absolute;
    bottom:22px; left:50%;
    transform:translateX(-50%);
    background:var(--card);
    padding:9px 18px;
    border-radius:999px;
    font-size:12.5px;
    color:var(--ink-soft);
    box-shadow:0 6px 18px rgba(38,33,28,0.14);
    z-index:900;
    pointer-events:none;
  }

  @media (max-width:760px){
    .sidebar{ width:220px; min-width:220px; padding:18px 14px 14px;}
    .sidebar.collapsed{ width:0; min-width:0; padding-left:0; padding-right:0; }
    .sidebar-inner{ width:200px; }
    .sidebar-toggle{ left:220px; }
    .info-card{ width:100%; max-width:100%; }
  }
</style>
</head>
<body>

<div class="app">
  <!-- ================= SIDEBAR ================= -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-inner">
      <div class="brand">
        <span class="brand-mark">泰・打卡</span>
      </div>
      <div class="brand-sub">Idol Food Passport</div>
      <div class="brand-tag">整理 CP／偶像去過的泰國餐廳，追星順便認識泰國，也留給一起追的粉絲。</div>

      <div class="section-label">選擇偶像／CP</div>
      <div class="idol-list" id="idolList"></div>

      <div class="section-label">城市</div>
      <div class="city-filter" id="cityFilter"></div>

      <div class="stamp-count">
        目前顯示 <b id="stampCount">0</b> 個打卡點
        <div style="margin-top:6px;">點地圖上的護照章圖釘看店家資訊，全部資料都可以之後自己在資料裡新增或修改。</div>
      </div>
    </div>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle" title="收起／展開側欄" aria-label="收起／展開側欄">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>

  <!-- ================= MAP ================= -->
  <div class="map-wrap">
    <div id="map"></div>

    <div class="map-topbar">
      <div class="search-box">🔍 搜尋店名 / 地區（示範用，可再接真實搜尋）</div>
      <div class="legend" id="legend"></div>
    </div>


    <div class="empty-hint" id="emptyHint" style="display:none;">這個組合目前還沒有打卡資料，快去蒐集情報吧！</div>

    <!-- ================= INFO CARD ================= -->
    <div class="info-card" id="infoCard">
      <div class="card-photo" id="cardPhotoWrap">
        <button class="card-close" id="cardClose">✕</button>
        <img class="card-photo-img" id="cardPhotoImg" style="display:none;" alt="">
        <div class="card-photo-emoji" id="cardEmoji">🍜</div>
      </div>
      <div class="card-body">
        <div class="card-city" id="cardCity">CITY</div>
        <h2 class="card-title" id="cardTitle">店名</h2>
        <div class="card-visitors" id="cardVisitors"></div>
        <div class="card-desc" id="cardDesc"></div>
        <div class="card-meta" id="cardMeta"></div>
        <div class="card-actions">
          <a class="btn btn-primary" id="cardMapLink" target="_blank" rel="noopener">在 Google 地圖開啟</a>
          <a class="btn btn-ghost" id="cardSourceLink" target="_blank" rel="noopener">查看情報來源</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
/* 資料現在放在 data.js 裡（透過下面 <script src="data.js"> 載入）。
   之後要新增/修改店家，只需要編輯 data.js，不用碰這個檔案。 */

const idolMap = Object.fromEntries(idols.map(i=>[i.id,i]));
let activeIdolIds = new Set(idols.map(i=>i.id)); // default: 全選
let activeCity = "全部";

// ---- render sidebar idol chips ----
const idolListEl = document.getElementById("idolList");
function idolCount(id){
  return restaurants.filter(r=>r.idolIds.includes(id)).length;
}
idols.forEach(idol=>{
  const chip = document.createElement("div");
  chip.className = "idol-chip active";
  chip.dataset.id = idol.id;
  chip.innerHTML = `
    <div class="idol-avatar" style="background:${idol.color}">${idol.name[0]}</div>
    <div class="idol-name">${idol.name}</div>
    <div class="idol-count">${idolCount(idol.id)}</div>
    <div class="check-dot"></div>
  `;
  chip.addEventListener("click", ()=>{
    if(activeIdolIds.has(idol.id)){
      activeIdolIds.delete(idol.id);
      chip.classList.remove("active");
    } else {
      activeIdolIds.add(idol.id);
      chip.classList.add("active");
    }
    renderPins();
  });
  idolListEl.appendChild(chip);
});

// ---- city filter ----
const cities = ["全部", ...new Set(restaurants.map(r=>r.city))];
const cityFilterEl = document.getElementById("cityFilter");
cities.forEach(city=>{
  const pill = document.createElement("div");
  pill.className = "city-pill" + (city==="全部" ? " active" : "");
  pill.textContent = city;
  pill.addEventListener("click", ()=>{
    activeCity = city;
    document.querySelectorAll(".city-pill").forEach(p=>p.classList.remove("active"));
    pill.classList.add("active");
    renderPins();
  });
  cityFilterEl.appendChild(pill);
});

// ---- legend ----
const legendEl = document.getElementById("legend");
legendEl.innerHTML = idols.map(i=>`
  <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
    <span style="width:9px;height:9px;border-radius:50%;background:${i.color};display:inline-block;"></span>
    ${i.name}
  </div>
`).join("");

// ---- map init ----
const map = L.map('map', { zoomControl:false }).setView([15.5, 100.9], 6);
L.control.zoom({ position:'bottomright' }).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];

function makeIcon(colors){
  const grad = colors.length>1
    ? `linear-gradient(135deg, ${colors.join(",")})`
    : colors[0];
  return L.divIcon({
    className:"",
    html:`<div class="stamp-pin" style="background:${grad}"><span>📍</span></div>`,
    iconSize:[38,38],
    iconAnchor:[19,34],
  });
}

function openCard(r){
  const emojiEl = document.getElementById("cardEmoji");
  const imgEl = document.getElementById("cardPhotoImg");
  if (r.photo) {
    imgEl.src = r.photo;
    imgEl.style.display = "block";
    emojiEl.style.display = "none";
  } else {
    imgEl.style.display = "none";
    imgEl.removeAttribute("src");
    emojiEl.style.display = "flex";
    emojiEl.textContent = r.emoji;
  }
  document.getElementById("cardCity").textContent = r.city;
  document.getElementById("cardTitle").textContent = r.name;
  document.getElementById("cardDesc").textContent = r.desc;
  document.getElementById("cardVisitors").innerHTML = r.idolIds.map(id=>
    `<span class="visitor-tag">${idolMap[id].name}</span>`
  ).join("");
  document.getElementById("cardMeta").innerHTML = `
    <div><b>到訪時間</b><span>${r.visitTime}</span></div>
    <div><b>座標</b><span>${r.lat.toFixed(4)}, ${r.lng.toFixed(4)}</span></div>
  `;
  document.getElementById("cardMapLink").href =
    `https://www.google.com/maps/search/?api=1&query=${r.lat},${r.lng}`;
  document.getElementById("cardSourceLink").href = r.source;
  document.getElementById("infoCard").classList.add("open");
}
document.getElementById("cardClose").addEventListener("click", ()=>{
  document.getElementById("infoCard").classList.remove("open");
});

function renderPins(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  const filtered = restaurants.filter(r=>
    r.idolIds.some(id=>activeIdolIds.has(id)) &&
    (activeCity==="全部" || r.city===activeCity)
  );

  document.getElementById("stampCount").textContent = filtered.length;
  document.getElementById("emptyHint").style.display = filtered.length ? "none" : "block";

  filtered.forEach(r=>{
    const colors = r.idolIds.filter(id=>activeIdolIds.has(id)).map(id=>idolMap[id].color);
    const marker = L.marker([r.lat, r.lng], { icon: makeIcon(colors.length?colors:["#999"]) }).addTo(map);
    marker.on("click", ()=>openCard(r));
    markers.push(marker);
  });
}

renderPins();

// ---- sidebar collapse/expand ----
const sidebarEl = document.getElementById("sidebar");
const sidebarToggleBtn = document.getElementById("sidebarToggle");

// 手機（小螢幕）預設把側欄收起來，一打開就是全螢幕地圖，
// 要看偶像/城市篩選時再點按鈕展開。
if (window.innerWidth <= 760) {
  sidebarEl.classList.add("collapsed");
}

sidebarToggleBtn.addEventListener("click", ()=>{
  sidebarEl.classList.toggle("collapsed");
  // 側欄寬度變化是漸層動畫，動畫跑完後要通知 Leaflet 重新計算地圖尺寸，
  // 不然地圖圖磚不會補滿新空出來的空間。
  setTimeout(()=>{ map.invalidateSize(); }, 300);
});
</script>
</body>
</html>
